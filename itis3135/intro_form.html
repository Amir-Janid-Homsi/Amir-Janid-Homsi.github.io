<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introduction Form</title>

    <!-- Fonts + Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/default.css">

    <!-- Highlight.js -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
  </head>

  <body>
    <!-- Header Include -->
    <div data-include="components/header.html"></div>

    <main>
      <h2>Introduction Form</h2>
      <h3>Please submit the form below.</h3>

      <form id="intro-form">

        <!-- NAME FIELDS -->
        <label>First Name:
          <input type="text" name="first_name" required value="Amir">
        </label>

        <label>Middle Name / Initial (optional):
          <input type="text" name="middle_name" value="J">
        </label>

        <label>Nickname / Preferred Name (optional):
          <input type="text" name="preferred_name">
        </label>

        <label>Last Name:
          <input type="text" name="last_name" required value="Homsi">
        </label>

        <!-- ACKNOWLEDGMENT -->
        <label>Acknowledgment Statement:
          <input type="text" name="ack_statement" required
                 value="I understand that what I put here is publicly available on the web and I won't put anything here I don't want the public to see">
        </label>

        <label>Acknowledgment Date:
          <input
            type="text"
              name="ack_date"
              id="ack_date"
              required
              value="2026-01-12"
              placeholder="YYYY-MM-DD"
          >
      </label>




        <!-- MASCOT -->
        <label>Mascot Adjective:
          <input type="text" name="mascot_adj" required value="Ascended">
        </label>

        <label>Mascot Animal:
          <input type="text" name="mascot_animal" required value="Human">
        </label>

        <label>Divider:
          <input type="text" name="divider" required value="|">
        </label>

        <!-- IMAGE -->
        <label>Picture:
          <input type="file" name="picture" accept="image/*">
        </label>

        <label>Picture Caption:
          <input type="text" name="picture_caption" required
                 value="&quot;This is the LockPickingLawyer and today-&quot;">
        </label>

        <!-- PERSONAL STATEMENT -->
        <label>Personal Statement:
          <textarea name="personal_statement" required>I’m a Sophomore (junior by credits!) at UNC Charlotte studying Computer Science with a focus in Systems and Networks. Can’t wait to learn more about computers in general, and in this class specifically web development.</textarea>
        </label>

        <!-- BULLETS -->
        <label>Personal Background:
          <textarea name="personal_background" required>I’m 19 and I’ve been tinkering with technology almost as far back as I can remember.</textarea>
        </label>

        <label>Professional Background:
          <textarea name="professional_background" required>Unfortunately, I have not found a job in the industry just yet.</textarea>
        </label>

        <label>Academic Background:
          <textarea name="academic_background" required>I strive for A’s, and I rarely pass a math class with anything higher than a B.</textarea>
        </label>

        <label>Background in this Subject:
          <textarea name="subject_background" required>The amount of time I have used “inspect element” to find something in a webpage over the last 10 years.</textarea>
        </label>

        <label>Primary Work Computer:
          <textarea name="primary_computer" required>My laptop, dual-booting Linux and Windows. Windows only for Lockdown Browser. Linux clock broken, prevents updates.</textarea>
        </label>

        <label>Backup Work Computer & Location Plan:
          <textarea name="backup_plan" required>I will go to the Atkins Library and get a loaner laptop.</textarea>
        </label>

        <!-- COURSES -->
        <h3>Courses</h3>
        <div id="courses-container">

          <div class="course">
            <label>Department:
              <input type="text" name="course_dept" value="ITSC">
            </label>
            <label>Number:
              <input type="text" name="course_num" value="2181">
            </label>
            <label>Name:
              <input type="text" name="course_name" value="Introduction to Computer Systems">
            </label>
            <label>Reason:
              <input type="text" name="course_reason" value="Requirement, hyper relevant to my concentration.">
            </label>
          </div>

          <div class="course">
            <label>Department:
              <input type="text" name="course_dept" value="ITSC">
            </label>
            <label>Number:
              <input type="text" name="course_num" value="3688">
            </label>
            <label>Name:
              <input type="text" name="course_name" value="Computers & Their Impact on Society">
            </label>
            <label>Reason:
              <input type="text" name="course_reason" value="Required and interesting.">
            </label>
          </div>

          <div class="course">
            <label>Department:
              <input type="text" name="course_dept" value="ITIS">
            </label>
            <label>Number:
              <input type="text" name="course_num" value="3135">
            </label>
            <label>Name:
              <input type="text" name="course_name" value="Front-End Web Application Development">
            </label>
            <label>Reason:
              <input type="text" name="course_reason" value="It would be good to know web dev better.">
            </label>
          </div>

          <div class="course">
            <label>Department:
              <input type="text" name="course_dept" value="ITCS">
            </label>
            <label>Number:
              <input type="text" name="course_num" value="3050">
            </label>
            <label>Name:
              <input type="text" name="course_name" value="Technical Interview Preparation 101">
            </label>
            <label>Reason:
              <input type="text" name="course_reason" value="Credit filler but hopefully useful.">
            </label>
          </div>

          <div class="course">
            <label>Department:
              <input type="text" name="course_dept" value="MATH">
            </label>
            <label>Number:
              <input type="text" name="course_num" value="2164">
            </label>
            <label>Name:
              <input type="text" name="course_name" value="Matrices & Linear Algebra">
            </label>
            <label>Reason:
              <input type="text" name="course_reason" value="Required course. Math is my weak point!">
            </label>
          </div>

        </div>

        <button type="button" id="add-course">Add Course</button>

        <!-- QUOTE -->
        <label>Quote:
          <input type="text" name="quote" required value="Don’t believe everything you read on the internet">
        </label>

        <label>Quote Author:
          <input type="text" name="quote_author" required value="Abraham D. Lincoln">
        </label>

        <!-- OPTIONAL -->
        <label>Funny Thing (optional):
          <input type="text" name="funny" value="I ask and comment in class a lot.">
        </label>

        <label>Something to Share (optional):
          <input type="text" name="share" value="I was born in New Jersey. All bread is MILES better up there.">
        </label>

        <!-- LINKS -->
        <h3>Links</h3>

        <label>CLT Web (webpages.charlotte.edu/username):
          <input type="url" name="link1" required value="https://webpages.charlotte.edu/ahomsi/">
        </label>

        <label>GitHub.io (username.github.io):
          <input type="url" name="link2" required value="https://Amir-Janid-Homsi.github.io/">
        </label>

        <label>GitHub (github.com/username):
          <input type="url" name="link3" required value="https://github.com/Amir-Janid-Homsi">
        </label>

        <label>freeCodeCamp (freecodecamp.org/username):
          <input type="url" name="link4" required value="https://www.freecodecamp.org/ahomsi">
        </label>

        <label>LinkedIn (linkedin.com/in/username/):
          <input type="url" name="link5" required value="https://www.linkedin.com/in/amir-homsi-8b2623341/">
        </label>

      </form>

      <!-- BUTTONS -->
      <div class="form-buttons">
        <button type="submit" form="intro-form">Submit</button>
        <button type="reset" form="intro-form">Reset</button>
        <button type="button" id="clear-button">Clear</button>
        <button type="button" id="generate-html-button">Generate HTML</button>
        <button type="button" id="generate-json-button">Generate JSON</button>
      </div>

      <div id="output"></div>
    </main>

    <!-- Footer Include -->
    <div data-include="components/footer.html"></div>

    <!-- Include Loader -->
    <script src="scripts/HTMLInclude.min.js"></script>

    <!-- Your Scripts -->
    <script src="scripts/introduction.js"></script>
    <script src="scripts/generate_html.js"></script>
    <script src="scripts/generate_json.js"></script>

    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Accumulus Autograder -->
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>

  </body>
</html>
